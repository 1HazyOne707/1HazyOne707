name: Update README with merged PRs

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch merged PRs and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import urllib.parse
          import json
          import os
          import re
          from collections import defaultdict

          token = os.environ["GH_TOKEN"]

          def gh_search(query):
              url = f"https://api.github.com/search/issues?q={urllib.parse.quote(query)}&per_page=50"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {token}",
                  "Accept": "application/vnd.github+json",
              })
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          data = gh_search("author:1HazyOne707 type:pr is:merged -repo:1HazyOne707/Codex-2")
          prs = data["items"]

          repos = defaultdict(list)
          for pr in prs:
              repo = pr["repository_url"].split("/")[-2] + "/" + pr["repository_url"].split("/")[-1]
              repos[repo].append(pr["title"])

          total = sum(len(v) for v in repos.values())

          with open("README.md") as f:
              content = f.read()

          # Only update the count line, preserve curated descriptions
          new_content = re.sub(
              r"(## Open Source Contributions\s*
\s*
)\d+[^
]+
",
              f"\\1{total} external merged PRs across {len(repos)} repositories — spanning documentation, bug fixes, test hardening, API design, performance, and architectural features.
",
              content,
          )

          with open("README.md", "w") as f:
              f.write(new_content)

          print(f"Updated: {total} PRs across {len(repos)} repos")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/1HazyOne707/1HazyOne707.git
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update merged PR count [skip ci]"
          git push
