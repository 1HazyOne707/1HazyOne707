name: Update README with merged PRs

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run README update script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_readme.py

      - name: Run tests
        run: pip install pytest --break-system-packages -q 2>/dev/null || pip install pytest -q; python3 -m pytest tests/ -v

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/1HazyOne707/1HazyOne707.git
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update merged PR count [skip ci]"
          git push
