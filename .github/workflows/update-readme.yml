name: Update README with merged PRs

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:       # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch merged PRs and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import os
          import re
          from collections import defaultdict

          token = os.environ["GH_TOKEN"]

          def gh_search(query):
              url = f"https://api.github.com/search/issues?q={urllib.parse.quote(query)}&per_page=50"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {token}",
                  "Accept": "application/vnd.github+json",
              })
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          import urllib.parse

          data = gh_search("author:1HazyOne707 type:pr is:merged -repo:1HazyOne707/Codex-2")
          prs = data["items"]

          # Group by repo
          repos = defaultdict(list)
          for pr in prs:
              repo = pr["repository_url"].split("/")[-2] + "/" + pr["repository_url"].split("/")[-1]
              repos[repo].append(pr["title"])

          total = sum(len(v) for v in repos.values())

          # Build contributions section
          lines = [
              "## Open Source Contributions",
              "",
              f"{total} external merged PRs across {len(repos)} repositories — spanning documentation, bug fixes, test hardening, API design, performance, and architectural features.",
              "",
          ]

          # Preferred order
          order = [
              "SikamikanikoBG/homelab-monitor",
              "JumpMasters/quartermaster",
              "qorexdevs/quicksave",
              "neo4j-labs/neocarta",
              "neo4j/neo4j-graphrag-python",
          ]

          shown = []
          for repo in order:
              if repo in repos:
                  count = len(repos[repo])
                  prefix = f"{count} PRs: " if count > 1 else ""
                  shown.append(repo)
                  lines.append(f"- **{repo}** — {prefix}{', '.join(repos[repo][0:3][:60] for _ in [1])}")

          # Any remaining repos not in order
          for repo, prs_list in repos.items():
              if repo not in shown:
                  count = len(prs_list)
                  prefix = f"{count} PRs: " if count > 1 else ""
                  lines.append(f"- **{repo}** — {prefix}{prs_list[0][:60]}")

          lines.append("")

          new_section = "\n".join(lines)

          with open("README.md") as f:
              content = f.read()

          # Replace between ## Open Source Contributions and ## Available
          new_content = re.sub(
              r"## Open Source Contributions.*?(?=## Available)",
              new_section + "\n",
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w") as f:
              f.write(new_content)

          print(f"Updated: {total} PRs across {len(repos)} repos")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update merged PR count [skip ci]"
          git push
